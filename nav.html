<!DOCTYPE html>
<html>
<head>
  <title>Navigation Bar</title>
  <style>
    ul {
      list-style: none;
      background-color: #333;
      padding: 0;
      margin: 0;
      overflow: hidden;
    }
    li {
      float: left;
    }
    li a {
      display: block;
      color: white;
      padding: 14px 20px;
      text-decoration: none;
    }
    li a:hover {
      background-color: #555;
    }
  </style>
</head>
<body>

<ul>
  <li><a href="#">Home</a></li>
  <li><a href="#">About</a></li>
  <li><a href="#">Services</a></li>
  <li><a href="#">Contact</a></li>
</ul>

</body>
</html>
